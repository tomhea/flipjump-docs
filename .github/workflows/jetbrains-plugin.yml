name: JetBrains plugin

on:
  pull_request:
    paths:
      - "editors/jetbrains-plugin/**"
      - ".github/workflows/jetbrains-plugin.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Build and test the plugin
        working-directory: editors/jetbrains-plugin
        run: ./gradlew --no-daemon test buildPlugin

      - name: Upload plugin zip
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: flipjump-jetbrains-plugin
          path: editors/jetbrains-plugin/build/distributions/*.zip
          if-no-files-found: error
