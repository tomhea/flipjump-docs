name: PR build

on:
  pull_request:
  workflow_dispatch:

jobs:
  actionlint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # SHA-pinned (raven-actions/actionlint v2.1.2):
      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8

  grammar:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install editor tooling deps
        run: cd editors && npm ci --omit=optional

      - name: Check synced grammar copies are up to date
        run: |
          cd editors && npm run sync
          git diff --exit-code -- vscode/syntaxes

      - name: Verify grammar scopes against the lexer contract
        run: cd editors && npm run verify

      # The .vsix in docs/source/_static is a committed binary that embeds the
      # grammar + colours. Guard against a contributor editing the sources but
      # forgetting to repackage (CI would otherwise stay green and the docs site
      # would serve a stale extension). vsce stores these files verbatim, so a
      # plain diff is exact. See editors/README.md to rebuild.
      - name: Verify shipped artifacts embed the current sources
        run: |
          set -eo pipefail
          vsix=docs/source/_static/flipjump-vscode.vsix
          diff <(unzip -p "$vsix" extension/syntaxes/flipjump.tmLanguage.json) editors/vscode/syntaxes/flipjump.tmLanguage.json
          diff <(unzip -p "$vsix" extension/package.json) editors/vscode/package.json
          diff <(unzip -p "$vsix" extension/language-configuration.json) editors/vscode/language-configuration.json
          echo "Shipped artifacts are up to date with editors/ sources."

  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      # `-e .[dev]` pulls pytest + pyyaml from pyproject.toml so dev
      # versions are pinned in one place instead of duplicated here.
      - name: Install deps
        run: |
          pip install -r docs/requirements.txt
          pip install -e ".[dev]"

      - name: Build Sphinx site (-W via Makefile default)
        run: cd docs && make html

      - name: Run pytest
        run: pytest tests/ -v

      - name: Upload HTML preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: html-preview
          path: docs/_build/html/
          retention-days: 7
